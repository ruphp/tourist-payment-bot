services:
  app:
    image: serversideup/php:8.3-fpm-alpine
    container_name: tourist-payment-bot-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    depends_on:
      - db

  nginx:
    image: nginx:1.27-alpine
    container_name: tourist-payment-bot-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  db:
    image: mariadb:11.4
    container_name: tourist-payment-bot-db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: tourist_payment_bot
      MARIADB_USER: bot
      MARIADB_PASSWORD: bot
      MARIADB_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - db-data:/var/lib/mysql

volumes:
  db-data:
